<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon/favicon.svg" sizes="32x32" />
    <title>Вход</title>

    <link rel="stylesheet" href="css/fancybox.css">
    <link rel="stylesheet" href="css/swiper-bundle.min.css">
    <link rel="stylesheet" href="css/style.min.css">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<!-- main -->
<main class="main">

    <!-- section-sign-in -->
    <section class="section section-sign-in">
    <div class="container">
        <div class="d-flex flex-column justify-content-center" style="min-height: 100dvh;">
            <div class="position-relative overflow-hidden rounded-4 bg-primary-gradient p-24px p-lg-40px">
                <div class="position-relative mb-20px mb-lg-0px z-1">
                    <a href="index.html">
                        <img class="img-fluid" src="img/logo/logo.svg" alt="Единая Реабилитационная Дистанционная Система мониторинга">
                    </a>
                </div>
                <!-- grid -->
                <div class="row">
                    <!-- col -->
                    <div class="col-lg-6">
                        <div class="position-relative z-1">
                            <div class="h4 mb-20px">Войдите в аккаунт</div>
                            <form action="#" class="needs-validation" novalidate>
                                <div class="d-flex flex-column gap-20px">
                                    <div>
                                        <div class="position-relative">
                                            <div class="form-floating">
                                                <input type="text" class="form-control" id="inputLogin" placeholder="Логин*" required>
                                                <label for="inputLogin">Логин*</label>
                                                <div class="invalid-feedback position-absolute start-0 top-100 mt-0">
                                                    Введите логин
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="password-toggle">
                                            <div class="form-floating">
                                                <input type="password" class="form-control" id="inputPassword" placeholder="Пароль*" required>
                                                <label for="inputPassword">Пароль*</label>
                                                <div class="invalid-feedback position-absolute start-0 top-100 mt-0">
                                                    Не правильно введен пароль
                                                </div>
                                            </div>
                                            <label class="password-toggle-button" aria-label="Show/hide password">
                                                <input type="checkbox" class="btn-check">
                                                <span class="password-toggle-button-icon d-flex">
                                                    <!-- eye -->
                                                    <svg width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor">
                                                        <path d="M23.8 11.6c-.1-.1-.1-.3-.2-.4-.8-1.4-1.7-2.7-2.8-3.8-1.9-2.1-4.9-4.3-8.8-4.3S5.2 5.3 3.2 7.4c-1.1 1.2-2 2.4-2.8 3.8-.1.1-.1.2-.2.4s-.1.5 0 .8v.1c.2.4.5.8.7 1.2.7 1 1.4 2 2.2 2.9 1.9 2.1 4.9 4.3 8.8 4.3 3.9 0 6.8-2.2 8.8-4.3 1.1-1.2 2-2.4 2.8-3.8.1-.1.1-.2.2-.4.2-.3.2-.6.1-.8zm-4.3 3.8c-1.8 1.9-4.3 3.7-7.5 3.7s-5.7-1.8-7.5-3.7c-1-1-1.8-2.2-2.5-3.4.7-1.2 1.5-2.4 2.5-3.4C6.3 6.7 8.8 4.9 12 4.9s5.7 1.8 7.5 3.7c1 1 1.8 2.2 2.5 3.4-.7 1.2-1.5 2.4-2.5 3.4z"></path><path d="M12 8.1c-2.2 0-3.9 1.8-3.9 3.9s1.7 3.9 3.9 3.9 3.9-1.7 3.9-3.9-1.7-3.9-3.9-3.9zm0 6c-1.1 0-2.1-1-2.1-2.1s.9-2.1 2.1-2.1 2.1 1 2.1 2.1-1 2.1-2.1 2.1z"></path>
                                                    </svg>
                                                    <!-- eye is crossed -->
                                                    <svg width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor">
                                                        <path d="M23.8 11.6c-.1-.1-.1-.3-.2-.4-.8-1.4-1.7-2.7-2.8-3.8-1.9-2.1-4.9-4.3-8.8-4.3-.8 0-1.5.1-2.3.3-.5.1-.8.6-.7 1.1s.6.8 1.1.6c.6-.1 1.3-.2 1.9-.2 3.2 0 5.7 1.8 7.5 3.7 1 1 1.8 2.2 2.5 3.4-.5.9-1.1 1.8-1.8 2.6-.3.4-.3.9.1 1.2.4.3.9.3 1.2-.1.9-1 1.6-2.2 2.3-3.3.1-.2.1-.5 0-.8zm-.2 10.8L10.5 9.3 6.8 5.5l-.2-.1-5-5C1.3 0 .7 0 .4.4c-.4.3-.4.9 0 1.2L4.8 6C3 7.6 1.4 9.5.3 11.6c-.1.2-.1.5 0 .8.1.1.1.2.2.4.8 1.4 1.7 2.7 2.8 3.8 1.9 2.1 4.9 4.3 8.8 4.3 2.1 0 4.1-.7 5.8-1.8l4.5 4.5c.3.3.9.3 1.2 0 .4-.3.4-.9 0-1.2zM10 11.2l2.8 2.8c-.8.3-1.7.1-2.3-.5-.7-.6-.8-1.5-.5-2.3zm2 7.9c-3.1 0-5.7-1.8-7.5-3.7-1-1-1.8-2.2-2.5-3.4 1-1.8 2.4-3.4 4-4.8l2.7 2.7-.3.6c-.7 1.5-.3 3.3.9 4.4 1.3 1.2 3.3 1.4 4.8.4l2.5 2.5c-1.4.8-3 1.3-4.6 1.3z"></path>
                                                    </svg>
                                                </span>
                                            </label>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="" id="checkRememberMe">
                                            <label class="form-check-label" for="checkRememberMe">
                                                Запомнить меня
                                            </label>
                                        </div>
                                    </div>
                                    <div>
                                        <button type="submit" class="btn btn-primary btn-l w-100">Войти</button>
                                    </div>
                                </div>
                            </form>
                            <script>
                                (() => {
                                    'use strict'

                                    // Bootstrap-валидация форм
                                    const forms = document.querySelectorAll('.needs-validation')
                                    Array.from(forms).forEach(form => {
                                        form.addEventListener('submit', event => {
                                            if (!form.checkValidity()) {
                                                event.preventDefault()
                                                event.stopPropagation()
                                            }
                                            form.classList.add('was-validated')
                                        }, false)
                                    })

                                    // Переключатель видимости пароля
                                    const passwordToggles = document.querySelectorAll('.password-toggle')
                                    passwordToggles.forEach(toggle => {
                                        const input = toggle.querySelector('.form-control')
                                        const btn = toggle.querySelector('.password-toggle-button')

                                        btn.addEventListener('click', event => {
                                            if (event.target.type === 'checkbox') {
                                                input.type = event.target.checked ? 'text' : 'password'
                                                btn.classList.toggle('password-visible', event.target.checked)
                                            }
                                        }, false)
                                    })
                                })()
                            </script>
                        </div>
                    </div>
                    <!-- col -->
                    <div class="col-lg-6 order-lg-first">
                        <div class="section-thumb-wrapper">
                            <img class="section-thumb-img" src="img/sign/sign-in.png" alt="...">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</main>

<!-- scripts -->
<script src="js/jquery-3.6.0.min.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/swiper-bundle.min.js"></script>
<script src="js/fancybox.umd.js"></script>
<script src="js/imask.min.js"></script>
<script src="js/wow.js"></script>
<script src="js/main.js"></script>

</body>

</html>
