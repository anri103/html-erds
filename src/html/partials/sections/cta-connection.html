<section class="section section-cta-connection">
    <!-- section-anchor -->
    <div class="section-anchor" id="homeCtaConnection"></div>
    <!-- container -->
    <div class="container-fluid no-gutters-x-down-md">
        <!-- gradient-wrapper -->
        <div class="position-relative overflow-hidden rounded-4 bg-primary-gradient p-24px p-lg-40px p-xl-60px p-xxl-80px">
            <!-- grid -->
            <div class="d-grid grid-cols-24 row-gap-20px gap-md-20px">
                
                <!-- col (title) -->
                <div class="col-span-24 col-span-md-11 col-span-lg-13 col-span-xl-13 col-span-xxl-14">
                    <div class="h-100">
                        <!-- section-thumb-img -->
                        <div class="d-flex align-items-center justify-content-center">
                            <img class="section-thumb-img" src="img/home/contacts-thumb-01.png" alt="...">
                        </div>
                        <!-- section-header -->
                        <div class="section__header section-cta-connection__header">
                            <h2 class="section__title h1">Заявка на&nbsp;подключение</h2>
                            <p class="section__subtitle">Оставьте реквизиты вашей компании, и&nbsp;мы&nbsp;подготовим договор и&nbsp;персональное коммерческое предложение</p>
                        </div>
                    </div>
                </div>

                <!-- col (form) -->
                <div class="col-span-24 col-span-md-13 col-span-lg-11 col-span-xl-11 col-span-xxl-10">
                    <form action="#">
                        <div class="position-relative d-grid grid-cols-2 gap-20px">
                            <div class="form-floating col-span-2 col-span-xl-2">
                                <input type="text" class="form-control input-l" id="inputOrganizationName" placeholder="Название медицинской организации">
                                <label for="inputOrganizationName">Название медицинской организации</label>
                            </div>
                            <div class="form-floating col-span-2 col-span-xl-2">
                                <input type="text" class="form-control input-l" id="inputOrganizationRegion" placeholder="Регион">
                                <label for="inputOrganizationRegion">Регион</label>
                            </div>
                            <div class="form-floating col-span-2 col-span-xl-2">
                                <input type="text" class="form-control input-l" id="inputUserName" placeholder="ФИО контактного лица">
                                <label for="inputUserName">ФИО контактного лица</label>
                            </div>
                            <div class="form-floating col-span-2 col-span-xl-2">
                                <input type="text" class="form-control input-l" id="inputUserJob" placeholder="Должность">
                                <label for="inputUserJob">Должность</label>
                            </div>

                            <div class="form-floating col-span-2 col-span-xl-1">
                                <input type="email" class="form-control input-l" id="inputUserEmail" placeholder="Email">
                                <label for="inputUserEmail">Email</label>
                            </div>
                            <div class="form-floating col-span-2 col-span-xl-1">
                                <input type="text" class="form-control input-l maskPhone" id="inputUserTel" placeholder="+7 999 999-99-99">
                                <label for="inputUserTel">Телефон</label>
                            </div>

                            <div class="col-span-2 col-span-xl-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="gridCheck" checked>
                                    <label class="form-check-label" for="gridCheck">
                                        Нажимая кнопку «Отправить», я&nbsp;даю согласие на&nbsp;обработку персональных данных согласно <a href="#">[Политике конфиденциальности]</a> и&nbsp;принимаю условия <a href="#">[Пользовательского соглашения]</a>
                                    </label>
                                </div>
                            </div>

                            <div class="col-span-2 col-span-xl-2">
                                <button type="submit" class="btn btn-primary btn-l w-100 w-xl-auto">Подать заявку</button>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>
